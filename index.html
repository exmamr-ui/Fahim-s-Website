<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fahim's Website</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e40;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e8e8f0;
      --muted: #7a7a99;
      --sent: #6c63ff;
      --received: #2e2e40;
      --white: #ffffff;
    }

    body {
      font-family: 'Poppins', 'Hind Siliguri', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 17px;
      font-weight: 600;
      color: var(--white);
    }

    .status {
      font-size: 12px;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status::before {
      content: '';
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1;
      display: flex;
      min-height: calc(100vh - 77px);
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      width: 280px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      gap: 12px;
    }

    .panel-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .contact-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: all .2s;
      font-size: 14px;
      font-weight: 500;
    }
    .contact-option:hover {
      background: var(--border);
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .contact-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .icon-wa  { background: rgba(37,211,102,.15); }
    .icon-msg { background: rgba(108,99,255,.15); }

    .contact-desc {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 400;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    .info-box {
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(108,99,255,.08);
      border: 1px solid rgba(108,99,255,.2);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* user name bar */
    .name-bar {
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .name-bar input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .name-bar input:focus { border-color: var(--accent); }
    .name-bar input::placeholder { color: var(--muted); }

    .name-label {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* chat messages */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      animation: fadeUp .25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.sent   { align-self: flex-end; align-items: flex-end; }
    .msg-row.received { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 11px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .sent .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .received .msg-bubble {
      background: var(--surface2);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .msg-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .sender-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 3px;
      padding: 0 4px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 12px;
      font-size: 14px;
    }
    .empty-icon { font-size: 48px; opacity: .4; }

    /* input bar */
    .input-bar {
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .input-bar textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 120px;
      min-height: 48px;
      transition: border-color .2s;
      line-height: 1.5;
    }
    .input-bar textarea:focus { border-color: var(--accent); }
    .input-bar textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #9c8fff);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .15s;
    }
    .send-btn:hover { transform: scale(1.07); }
    .send-btn:active { transform: scale(.95); }
    .send-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 20px; height: 20px; fill: #fff; }

    /* toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: all .3s;
      z-index: 999;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* loading dots */
    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--surface2);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
      width: fit-content;
    }
    .typing span {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce .8s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* responsive */
    @media (max-width: 640px) {
      .left-panel { width: 220px; }
    }
    @media (max-width: 480px) {
      main { flex-direction: column; }
      .left-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; flex-wrap: wrap; padding: 14px; }
    }
  </style>
</head>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot,
    serverTimestamp,
    doc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

  // ─── YOUR FIREBASE CONFIG ───
  const firebaseConfig = {
    apiKey: "AIzaSyAfVXqlCXIZE95z2dj0XmNDe5U",
    authDomain: "fahim-s-website.firebaseapp.com",
    projectId: "fahim-s-website",
    storageBucket: "fahim-s-website.appspot.com",
    messagingSenderId: "549002044201",
    appId: "1:549002044201:web:fafcfd8e56067",
    measurementId: "G-NX6J1ELPVJ"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── Generate or load session ID for this visitor ──
  let sessionId = localStorage.getItem('fahim_session');
  if (!sessionId) {
    sessionId = 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    localStorage.setItem('fahim_session', sessionId);
  }

  // ── Load saved name ──
  const savedName = localStorage.getItem('fahim_username');
  if (savedName) document.getElementById('userName').value = savedName;

  // ── Real-time listener for THIS session's messages ──
  const msgsRef  = collection(db, 'chats', sessionId, 'messages');
  const msgsQuery = query(msgsRef, orderBy('timestamp', 'asc'));

  let firstLoad = true;

  onSnapshot(msgsQuery, (snapshot) => {
    const chatArea  = document.getElementById('chatArea');
    const emptyState = document.getElementById('emptyState');

    if (snapshot.empty) {
      emptyState.style.display = 'flex';
      return;
    }

    emptyState.style.display = 'none';

    // Remove typing indicator if exists
    const typingEl = document.getElementById('typingIndicator');
    if (typingEl) typingEl.remove();

    // Rebuild messages
    // Only add new messages (avoid full re-render)
    const rendered = new Set([...chatArea.querySelectorAll('.msg-row')].map(el => el.dataset.id));

    snapshot.docChanges().forEach(change => {
      if (change.type === 'added') {
        const data = change.doc.data();
        const id   = change.doc.id;
        if (rendered.has(id)) return;

        const isFahim = data.sender === 'fahim';
        const row = document.createElement('div');
        row.className = `msg-row ${isFahim ? 'received' : 'sent'}`;
        row.dataset.id = id;

        if (isFahim) {
          const nameEl = document.createElement('div');
          nameEl.className = 'sender-name';
          nameEl.textContent = 'Fahim';
          row.appendChild(nameEl);
        }

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = data.text;
        row.appendChild(bubble);

        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        const ts = data.timestamp?.toDate ? data.timestamp.toDate() : new Date();
        meta.textContent = ts.toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' });
        row.appendChild(meta);

        chatArea.appendChild(row);
      }
    });

    // Scroll to bottom
    chatArea.scrollTop = chatArea.scrollHeight;
    firstLoad = false;
  });

  // ── Send Message ──
  window.sendMessage = async function () {
    const nameInput = document.getElementById('userName');
    const msgInput  = document.getElementById('userMsg');
    const sendBtn   = document.getElementById('sendBtn');

    const name = nameInput.value.trim();
    const text = msgInput.value.trim();

    if (!name) { toast('নাম লিখুন আগে!'); nameInput.focus(); return; }
    if (!text) { toast('মেসেজ লিখুন!'); msgInput.focus(); return; }

    localStorage.setItem('fahim_username', name);

    sendBtn.disabled = true;
    msgInput.value   = '';
    msgInput.style.height = '';

    try {
      // Save to session sub-collection
      await addDoc(collection(db, 'chats', sessionId, 'messages'), {
        sender:    'user',
        senderName: name,
        text,
        timestamp: serverTimestamp()
      });

      // Also save to top-level 'messages' for Fahim's dashboard
      await addDoc(collection(db, 'messages'), {
        sessionId,
        senderName: name,
        text,
        timestamp: serverTimestamp(),
        replied: false
      });

    } catch (e) {
      toast('Error: ' + e.message);
    } finally {
      sendBtn.disabled = false;
      msgInput.focus();
    }
  };

  // ── WhatsApp fallback ──
  window.openWhatsApp = function () {
    const name = document.getElementById('userName').value.trim() || 'একজন ভিজিটর';
    const msg  = document.getElementById('userMsg').value.trim()  || 'হ্যালো Fahim!';
    const num  = '8801303359567';
    window.open(`https://wa.me/${num}?text=Hi Fahim, আমি ${name}.%0A%0AMessage: ${msg}`, '_blank');
  };

  window.focusChat = function () {
    document.getElementById('userMsg').focus();
  };

  window.handleKey = function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      window.sendMessage();
    }
  };

  window.autoResize = function (el) {
    el.style.height = '';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  };

  window.toast = function (msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  };
</script>

        let currentSession = null;
        let unsubChat = null;

        // Load all sessions (from top-level messages, grouped by sessionId)
        const sessions = {};
        const allMsgsQ = query(collection(db2, 'messages'), orderBy('timestamp', 'desc'));
        onSnapshot(allMsgsQ, (snap) => {
          snap.docs.forEach(d => {
            const data = d.data();
            if (!sessions[data.sessionId]) {
              sessions[data.sessionId] = { name: data.senderName, last: data.text, id: data.sessionId };
            }
          });

          const list = document.getElementById('sessionList');
          list.innerHTML = '';
          if (!Object.keys(sessions).length) {
            list.innerHTML = '<div style="color:#7a7a99;padding:16px">এখনো কোনো মেসেজ নেই</div>';
            return;
          }
          Object.values(sessions).forEach(s => {
            const card = document.createElement('div');
            card.className = 'session-card' + (s.id === currentSession ? ' active' : '');
            card.innerHTML = `<div class="sc-name">${s.name}</div><div class="sc-preview">${s.last}</div>`;
            card.onclick = () => openSession(s.id, s.name);
            list.appendChild(card);
          });
        });

        function openSession(sid, name) {
          currentSession = sid;
          document.getElementById('replyPanel').style.display = 'flex';
          document.getElementById('replyPanel').style.flexDirection = 'column';
          document.getElementById('replyHeader').textContent = `💬 ${name}`;

          if (unsubChat) unsubChat();

          const chatQ = query(collection(db2, 'chats', sid, 'messages'), orderBy('timestamp', 'asc'));
          unsubChat = onSnapshot(chatQ, (snap) => {
            const ac = document.getElementById('adminChat');
            ac.innerHTML = '';
            snap.docs.forEach(d => {
              const data = d.data();
              const div = document.createElement('div');
              div.className = 'am' + (data.sender === 'fahim' ? ' fahim' : '');
              div.textContent = data.text;
              const ts = data.timestamp?.toDate ? data.timestamp.toDate() : new Date();
              div.innerHTML += `<div class="am-meta">${data.sender === 'fahim' ? 'আপনি' : data.senderName} · ${ts.toLocaleTimeString('bn-BD', {hour:'2-digit',minute:'2-digit'})}</div>`;
              ac.appendChild(div);
            });
            ac.scrollTop = ac.scrollHeight;
          });
        }

        window.adminReply = async function () {
          if (!currentSession) return;
          const inp = document.getElementById('adminInput');
          const text = inp.value.trim();
          if (!text) return;
          inp.value = '';
          await addDoc(collection(db2, 'chats', currentSession, 'messages'), {
            sender: 'fahim',
            senderName: 'Fahim',
            text,
            timestamp: serverTimestamp()
          });
        };

        document.getElementById('adminInput').addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.adminReply(); }
        });
      });
    });
  }
</script>

</html>
